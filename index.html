<!DOCTYPE html>
<html lang="de" data-channel="demo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Link Tree — Demo</title>
    <meta name="description" content="Open-Source Linktree-Alternative mit Tracking, schönem Design und Agent-First Setup">

    <!--
        ===== KONFIGURATION =====
        Diese Meta-Tags steuern src/tracking.js und src/youtube.js.
        Wenn ein Wert leer ist, wird das jeweilige Feature deaktiviert.
        Details: docs/03-setup-tracking.md  und  docs/02-setup-youtube.md
    -->
    <meta name="olt:supabase-url"      content="">
    <meta name="olt:supabase-anon-key" content="">
    <meta name="olt:channel"           content="demo">

    <link rel="stylesheet" href="src/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="phone-frame">
    <div class="container">

        <!-- ===================== HEADER ===================== -->
        <header class="profile">
            <img class="profile__avatar" src="assets/avatar-placeholder.svg" alt="Profile">
            <h1 class="profile__name">Your Name</h1>
            <p class="profile__tagline">Was du machst &middot; Wofür du stehst</p>
        </header>

        <!-- ===================== HAUPTLINKS =====================
            ANLEITUNG: siehe docs/04-button-styles.md
            - Reihenfolge ändern: <a>-Blöcke verschieben
            - Neuen Link: <a>-Block kopieren und anpassen
            - data-link="..." landet im Tracking-Dashboard
        -->
        <section class="links" aria-label="Hauptlinks">

            <!-- Style 1: Highlight Card (mit Bild + CTA) -->
            <a href="https://example.com/booking"
               class="consulting-card"
               data-link="Highlight CTA"
               target="_blank"
               rel="noopener">
                <div class="consulting-card__img" role="img" aria-label="Highlight"></div>
                <div class="consulting-card__content">
                    <div class="consulting-card__eyebrow">Eyebrow Label</div>
                    <div class="consulting-card__title">Dein Hauptangebot</div>
                    <div class="consulting-card__sub">Ein Satz, der den Wert erklärt</div>
                    <div class="consulting-card__cta">Jetzt starten &rarr;</div>
                </div>
            </a>

            <!-- Style 2: Stacked Button (Titel + Untertitel) -->
            <a href="https://example.com/newsletter"
               class="link-button link-button--stacked"
               data-link="Newsletter"
               target="_blank"
               rel="noopener">
                <span class="link-button__text">Newsletter</span>
                <span class="link-button__subtitle">Wöchentliche Insights und Updates</span>
            </a>

            <!-- Style 3: YouTube Auto-Update Card (optional, siehe docs/02) -->
            <a id="latest-video-link"
               href="https://www.youtube.com/"
               class="video-card"
               data-link="Neuestes Video"
               target="_blank"
               rel="noopener">
                <img id="latest-video-thumb" class="video-card__thumb" src="assets/video-placeholder.svg" alt="Video Thumbnail">
                <div class="video-card__overlay">
                    <svg class="video-card__play" width="48" height="48" viewBox="0 0 48 48"><circle cx="24" cy="24" r="24" fill="rgba(255,0,0,0.9)"/><polygon points="20,16 20,32 34,24" fill="white"/></svg>
                </div>
                <div class="video-card__info">
                    <span class="video-card__label">Neuestes Video</span>
                    <span class="video-card__title" id="latest-video-title">Wird geladen...</span>
                </div>
            </a>

            <!-- Style 4: Simple Button -->
            <a href="https://example.com/projekt"
               class="link-button"
               data-link="Projekt"
               target="_blank"
               rel="noopener">
                <span class="link-button__text">Projekt oder Marke</span>
            </a>

            <!-- Style 5: Simple Button -->
            <a href="https://example.com/app"
               class="link-button"
               data-link="App"
               target="_blank"
               rel="noopener">
                <span class="link-button__text">Meine App</span>
            </a>

        </section>

        <!-- ===================== PRODUKTE (optional, default off) =====================
            Aktivieren: in src/styles.css das  `.products { display: none; }`  entfernen.
            Jede Karte hat ein Bild links + Text rechts.
        -->
        <section class="products" aria-label="Produkte">
            <h2 class="products__heading">Empfehlungen</h2>

            <a href="https://example.com/produkt-a"
               class="product-card"
               data-link="Produkt A"
               target="_blank"
               rel="noopener">
                <img class="product-card__image" src="assets/avatar-placeholder.svg" alt="Produkt A">
                <span class="product-card__text">Produkt A</span>
            </a>

        </section>

        <!-- ===================== FOOTER ===================== -->
        <footer class="footer">
            <div class="social">
                <!-- TikTok -->
                <a href="https://tiktok.com/@deinhandle" class="social__icon" data-link="Social: TikTok" target="_blank" rel="noopener" aria-label="TikTok">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1v-3.5a6.37 6.37 0 0 0-.79-.05A6.34 6.34 0 0 0 3.15 15a6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.34-6.34V8.8a8.18 8.18 0 0 0 4.76 1.52v-3.4a4.85 4.85 0 0 1-1-.23z"/></svg>
                </a>
                <!-- Instagram -->
                <a href="https://instagram.com/deinhandle" class="social__icon" data-link="Social: Instagram" target="_blank" rel="noopener" aria-label="Instagram">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
                </a>
                <!-- LinkedIn -->
                <a href="https://linkedin.com/in/deinhandle" class="social__icon" data-link="Social: LinkedIn" target="_blank" rel="noopener" aria-label="LinkedIn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                </a>
                <!-- YouTube -->
                <a href="https://www.youtube.com/" class="social__icon" data-link="Social: YouTube" target="_blank" rel="noopener" aria-label="YouTube">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                </a>
            </div>

            <div class="footer__legal">
                <a href="components.html" class="footer__impressum" data-link="Components">Button Library</a>
                <a href="https://github.com/senorkaya/open-link-tree" class="footer__impressum" data-link="GitHub" target="_blank" rel="noopener">GitHub</a>
            </div>
        </footer>

    </div>
    </div><!-- /phone-frame -->

    <script src="src/tracking.js"></script>
    <script src="src/youtube.js"></script>
</body>
</html>
